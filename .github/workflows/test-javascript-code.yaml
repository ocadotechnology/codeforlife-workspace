name: Test JavaScript Code

on:
  workflow_call:
    inputs:
      node-version:
        description: "The Node.js version to set up."
        type: number
        required: false
        default: 22
      working-directory:
        description: "The current working directory."
        type: string
        required: false
        default: "."
      download-branch:
        description: "The branch of the workspace repo to download all files from."
        type: string
        required: false
        default: "main"
    secrets: # All secrets should not be required to support contributors.
      CODECOV_TOKEN:
        description: "The token used to gain access to Codecov."
        required: false
      SNYK_TOKEN:
        description: "The Snyk token used to connect to the Snyk project."
        required: false

jobs:
  test-js-code:
    runs-on: ubuntu-22.04
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    env:
      LANG: C.UTF-8
      OCADO_TECH_ORG_ID: 2088731
    steps:
      - name: 🌐 Set up JavaScript ${{ inputs.node-version }} Environment
        uses: ocadotechnology/codeforlife-workspace/.github/actions/javascript/setup-environment@main
        with:
          node-version: ${{ inputs.node-version }}
          workspace-ref: ${{ inputs.download-branch }}
          install-prod: false

      - name: 🔎 Check Code Format
        id: check-format
        continue-on-error: true
        run: .workspace/frontend/scripts format:check

      - name: 🔎 Check Code Types
        id: check-types
        continue-on-error: true
        run: .workspace/frontend/scripts types:check

      - name: 🔎 Check Code
        id: check-code
        continue-on-error: true
        run: .workspace/frontend/scripts code:check

      - name: 🧪 Test Code
        id: test-code
        continue-on-error: true
        run: .workspace/frontend/scripts test:coverage

      - name: 📈 Upload Coverage Reports to Codecov
        if: >-
          github.repository_owner_id == env.OCADO_TECH_ORG_ID &&
          steps.test-code.outcome == 'success'
        uses: ocadotechnology/codeforlife-workspace/.github/actions/codecov/upload-report@main
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/cobertura-coverage.xml

      - name: 🐶 Run Snyk Tests
        id: check-packages
        continue-on-error: true
        if: github.repository_owner_id == env.OCADO_TECH_ORG_ID
        uses: ocadotechnology/codeforlife-workspace/.github/actions/snyk/run-tests@main
        with:
          snyk-token: ${{ secrets.SNYK_TOKEN }}
          config-path: frontend/.snyk
          add-test-args: --package-manager=yarn

      - name: 🚦 Exit if Any Check Failed
        if: >-
          steps.check-format.outcome == 'failure' ||
          steps.check-types.outcome == 'failure' ||
          steps.check-code.outcome == 'failure' ||
          steps.test-code.outcome == 'failure' ||
          steps.check-packages.outcome == 'failure'
        run: |
          echo "::error::One or more of the previous steps have failed. Please check the logs for more details."
          exit 1
