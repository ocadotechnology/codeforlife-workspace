name: "Code for Life - Bot - Setup"
description: "Sets up CFL's bot as the GitHub and Git user."
inputs:
  cfl-app-private-key:
    description: "The private key of CFL's GitHub App."
    required: true
  repositories:
    description: "The repositories to which the bot should have access. If not specified, the bot will have access to the current repository by default."
    required: false
outputs:
  token:
    description: "The GitHub token of the CFL bot."
    value: ${{ steps.create-token.outputs.token }}
  user-id:
    description: "The GitHub user ID of the bot."
    value: ${{ steps.get-user-id.outputs.user-id }}
  user-name:
    description: "The GitHub username of the bot."
    value: ${{ steps.get-user-name.outputs.user-name }}
  user-email:
    description: "The GitHub user email of the bot."
    value: ${{ steps.get-user-email.outputs.user-email }}
  git-committer:
    description: "The name and email to use for Git commits, in the format 'Name <email>'."
    value: ${{ steps.get-git-committer.outputs.git-committer }}
runs:
  using: composite
  steps:
    - uses: actions/create-github-app-token@v2
      id: create-token
      with:
        app-id: 2998079
        private-key: ${{ inputs.cfl-app-private-key }}
        owner: ${{ github.repository_owner }}
        repositories: ${{ inputs.repositories }}

    - shell: bash 
      id: get-user-id
      env:
        GH_TOKEN: ${{ steps.create-token.outputs.token }}
      run: echo "user-id=$(gh api "/users/${{ steps.create-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

    - shell: bash
      id: get-user-name
      run: echo "user-name=${{ steps.create-token.outputs.app-slug }}[bot]" >> "$GITHUB_OUTPUT"

    - shell: bash
      id: get-user-email
      run: echo "user-email=${{ steps.get-user-id.outputs.user-id }}+${{ steps.create-token.outputs.app-slug }}[bot]@users.noreply.github.com" >> "$GITHUB_OUTPUT"

    - shell: bash
      id: get-git-committer
      run: echo "git-committer=${{ steps.get-user-name.outputs.user-name }} <${{ steps.get-user-email.outputs.user-email }}>"  >> "$GITHUB_OUTPUT"

    - shell: bash
      run: |
        git config --global user.name '${{ steps.get-user-name.outputs.user-name }}'
        git config --global user.email '${{ steps.get-user-email.outputs.user-email }}'
