name: "Code for Life - GitHub - Release"
description: "Release a deployment to GitHub."
inputs:
  cfl-bot-gh-token:
    description: "The GitHub token of the CFL bot."
    required: true
  cfl-bot-user-name:
    description: "The GitHub username of the CFL bot."
    required: true
  cfl-bot-user-email:
    description: "The GitHub user email of the CFL bot."
    required: true
  checkout:
    description: "A flag to designate if the code should be checked out."
    required: true
    default: "true"
  args:
    description: "Arguments passed to `npx semantic-release`."
    required: false
  ref:
    description: "The branch, tag or SHA to checkout."
    required: false
runs:
  using: composite
  steps:
    - name: 🛫 Checkout
      if: ${{ inputs.checkout == 'true' }}
      uses: actions/checkout@v5
      with:
        token: ${{ inputs.cfl-bot-gh-token }}
        ref: ${{ inputs.ref }}
        fetch-depth: 0

    - name: 🌐 Set up Node 22
      uses: actions/setup-node@v6
      with:
        node-version: 22
        check-latest: true

    - name: 🛠 Install Dependencies
      shell: bash
      run: |
        npm install --global npm
        npm install --global \
          semantic-release@^25.0.2 \
          @semantic-release/git@^10.0.1 \
          @semantic-release/changelog@^6.0.3

    - name: 🚀 Publish Semantic Release
      shell: bash
      env:
        # NOTE: do not use NPM_TOKEN! Use GitHub OIDC instead for npm authentication.
        GH_TOKEN: ${{ inputs.cfl-bot-gh-token }}
        GIT_AUTHOR_NAME: ${{ inputs.cfl-bot-user-name }}
        GIT_AUTHOR_EMAIL: ${{ inputs.cfl-bot-user-email }}
        GIT_COMMITTER_NAME: ${{ inputs.cfl-bot-user-name }}
        GIT_COMMITTER_EMAIL: ${{ inputs.cfl-bot-user-email }}
      run: npx semantic-release ${{ inputs.args }}
